{% load static %}
<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="utf-8">
        <title>Register / Login</title>
        <link rel="stylesheet" href="{% static 'css/reg_styles.css' %}">
    </head>
    <body>
        <div class="container">
            <div class="toggle-container">
                <button class="toggle-btn active" onclick="showForm('register')">Register</button>
                <button class="toggle-btn" onclick="showForm('login')">Login</button>
            </div>
            
            <div id="register-form" class="form-container active">
                <form method="post" action="register">
                    {% csrf_token %}
                    <h1>Create Account</h1>
                    {{ register_form.as_p }}
                    <!-- <div class="form-group">
                        <label>Username: </label>
                        <input type="text" placeholder="Create username">
                    </div>
                    <div class="form-group">
                        <label>Email: </label>
                        <input type="email" placeholder="Register your email">
                    </div>
                    <div class="form-group">
                        <label>Password: </label>
                        <input type="password" placeholder="Password">
                    </div>
                    <div class="form-group">
                        <label>Password (again): </label>
                        <input type="password" placeholder="Password Again">
                    </div> -->
                    <button type="submit" class="submit-btn">Create Account</button>
                </form>
            </div>
            
            <div id="login-form" class="form-container">
                <form method="post" action="login">
                    {% csrf_token %}
                    <h1>Welcome Back!</h1>
                    {{ login_form.as_p }}
                    <!-- <div class="form-group">
                        <label>Username: </label>
                        <input type="text" placeholder="Username/Email/NumberPhone">
                    </div>
                    <div class="form-group">
                        <label>Password: </label>
                        <input type="password" placeholder="Enter Password">
                    </div> -->
                    <button type="submit" class="submit-btn">Login</button>
                </form>
            </div>
        </div>
        
        <script>
            function showForm(formType) {
                const registerForm = document.getElementById('register-form');
                const loginForm = document.getElementById('login-form');
                const buttons = document.querySelectorAll('.toggle-btn');
                
                if (formType === 'register') {
                    registerForm.classList.add('active');
                    loginForm.classList.remove('active');
                    buttons[0].classList.add('active');
                    buttons[1].classList.remove('active');
                } else {
                    loginForm.classList.add('active');
                    registerForm.classList.remove('active');
                    buttons[1].classList.add('active');
                    buttons[0].classList.remove('active');
                }
            }
        </script>
    </body>
</html>
