{% load static %}
<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="utf-8">
        <title>Register</title>
        <link rel="stylesheet" href="{% static 'css/reg_style.css' %}">
        <style>

        </style>
    </head>
    <body>
        <div>
            <form method="post" action="register">
                {% csrf_token %}
                <h1>This Form is Register</h1>
                <label>Username: </label><input type="username" placeholder="Create username"><br>
                <label>Email: </label><input type="email" placeholder="Register your email"><br>
                <label>Password: </label><input type="password" placeholder="Password"><br>
                <label>Password (again): </label><input type="password" placeholder="Password Again"><br>
                <button type="submit">Create Account</button>
            </form>
            <div>
                <div>Hello, User!</div> <!-- user Register -->
                <div>Welcome Back!</div><!-- user Login    -->
            </div>
            <form method="post" action="login">
                {% csrf_token %}
                <h1>This Form is Login</h1>
                <label>Username: </label><input type="username" placeholder="Username/Email/NumberPhone"><br>
                <label>Password: </label><input type="password" placeholder="E*te* P**aw*rd"><br>
                <button type="submit">Login</button>
            </form>
        </div>
        <script>

        </script>
    </body>
</html>
