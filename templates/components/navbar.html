{% load static %}
<nav id="navbar">
    <a >OnStackes</a>
    <a class="btn">Home</a>
    <a class="btn">Post</a>
    {% if request.user.is_superuser %}
        <!-- Use 'admin:index' instead of 'admin:site' -->
        <a class="btn" href="{% url 'admin:index' %}">Admin</a>
        
        <!-- Link to the standard Django Auth user list -->
        <a class="btn">Auth</a>
    {% endif %}

    {% if request.user.is_authenticated %}
        <a class="btn">Profile</a>
        <button class="btn" onclick="fetch('{% url 'auth_system:logout' %}', {method: 'POST', headers: { 'X-CSRFToken': '{{ csrf_token }}' }}).then(() => location.reload())">
        Logout</button>

    {% else %}
        <a href="{% url 'auth_system:register_login' %}">Login/Register</a>
    {% endif %}
</nav>
<link rel="stylesheet" href="{% static 'css/components/navbar.css' %}">
<script>
const navbar = document.getElementById('navbar');

function handleScroll() {
    if (!navbar) {
        return;
    } // prevent error if navbar is missing
    if (window.scrollY === 0) {
        navbar.classList.add('no-shadow');
    } else {
        navbar.classList.remove('no-shadow');
    }
}

handleScroll();
window.addEventListener('scroll', handleScroll);
</script>
