<!DOCTYPE html>
<html>
 <head>
  <meta charset="utf-8">
  <meta http-equiv="refresh" content="2">
  <title>Index testing</title>
  <style>
html, body {margin: 0; padding: 0;}

.container-html {
  display: grid;
  grid-template-areas: 
    "header header header"
    "l-aside main r-aside"
    "footer footer footer"
  ;
  grid-template-rows: 3em auto 12em;
  grid-template-columns: 12em 1fr 12em;
  min-height: 100dvh
}

.container-html > header {
  grid-area: header;
}
.container-html > aside[value="left-side"] {
 background-color: lightgreen;
 grid-area: l-aside;
}
.container-html > aside[value="right-side"] {
 background-color: green;
 grid-area: r-aside;
}
.container-html > main {
  background-color: cyan;
  grid-area: main;
}
.container-html > footer {
  background-color: blue;
  grid-area: footer;
}

@media (max-width: 767px) {
    /* Mobile-specific styles here */
}

  </style>
 </head>
 <body>
  <div class="container-html">
   <header>
    {% include 'components/navbar.html' %}
   </header>

   <main>This layout is main</main>
   <aside value="left-side">
    <input type="search" id="search" placeholder="Search"><br>
    <a>Welcome</a><br>
    <a>Getting Started</a><br>
    <a>How to write a code</a><br>
   </aside>

   <aside value="right-side">

   </aside>

   <footer>This is Footer can read under.</footer>
  </div>
 </body>
</html>
